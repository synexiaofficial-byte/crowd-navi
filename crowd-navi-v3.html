<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>リアル混雑ナビ — 今行くべきか、1秒でわかる。</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=Space+Mono:wght@400;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2235;
    --border: rgba(255,255,255,0.07);
    --text: #f0f4ff;
    --text-muted: #6b7a99;
    --accent: #00e5ff;
    --green: #00e676;
    --yellow: #ffd600;
    --red: #ff1744;
    --green-bg: rgba(0,230,118,0.08);
    --yellow-bg: rgba(255,214,0,0.08);
    --red-bg: rgba(255,23,68,0.08);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'Noto Sans JP', sans-serif; min-height: 100vh; overflow-x: hidden; }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px; pointer-events: none; z-index: 0;
  }
  header {
    position: sticky; top: 0; z-index: 10;
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 40px; border-bottom: 1px solid var(--border);
    backdrop-filter: blur(10px); background: rgba(10,14,26,0.85);
  }
  .logo { display: flex; align-items: center; gap: 12px; }
  .logo-icon { width: 36px; height: 36px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; animation: pulse-icon 2s ease-in-out infinite; }
  @keyframes pulse-icon { 0%,100%{box-shadow:0 0 0 0 rgba(0,229,255,0.4)}50%{box-shadow:0 0 0 8px rgba(0,229,255,0)} }
  .logo-text { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 2px; color: var(--text); line-height: 1; }
  .logo-sub { font-size: 10px; color: var(--accent); font-family: 'Space Mono', monospace; letter-spacing: 1px; }
  .header-right { display: flex; align-items: center; gap: 16px; }
  .live-indicator { display: flex; align-items: center; gap: 6px; font-size: 12px; font-family: 'Space Mono', monospace; color: var(--green); }
  .live-dot { width: 8px; height: 8px; background: var(--green); border-radius: 50%; animation: blink 1.2s ease-in-out infinite; }
  @keyframes blink { 0%,100%{opacity:1}50%{opacity:0.2} }
  .beta-badge { background: rgba(124,58,237,0.2); border: 1px solid rgba(124,58,237,0.4); color: #a78bfa; font-size: 11px; font-family: 'Space Mono', monospace; padding: 4px 10px; border-radius: 4px; letter-spacing: 1px; }
  .hero { position: relative; z-index: 1; text-align: center; padding: 80px 40px 60px; }
  .hero-glow { position: absolute; top: -100px; left: 50%; transform: translateX(-50%); width: 600px; height: 400px; background: radial-gradient(ellipse, rgba(0,229,255,0.12) 0%, transparent 70%); pointer-events: none; }
  .hero-tag { display: inline-flex; align-items: center; gap: 8px; background: rgba(0,229,255,0.08); border: 1px solid rgba(0,229,255,0.2); padding: 6px 16px; border-radius: 100px; font-size: 12px; font-family: 'Space Mono', monospace; color: var(--accent); margin-bottom: 24px; letter-spacing: 0.5px; }
  .hero h1 { font-family: 'Bebas Neue', sans-serif; font-size: clamp(52px,8vw,96px); line-height: 1; letter-spacing: 4px; margin-bottom: 16px; background: linear-gradient(135deg,#fff 40%,var(--accent) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .hero p { font-size: 16px; color: var(--text-muted); max-width: 480px; margin: 0 auto 12px; line-height: 1.8; }
  .stats-bar { position: relative; z-index: 1; display: flex; justify-content: center; margin: 0 40px 48px; border: 1px solid var(--border); border-radius: 12px; overflow: hidden; background: var(--surface); }
  .stat-item { flex: 1; padding: 20px 24px; text-align: center; border-right: 1px solid var(--border); }
  .stat-item:last-child { border-right: none; }
  .stat-num { font-family: 'Space Mono', monospace; font-size: 28px; font-weight: 700; color: var(--accent); line-height: 1; margin-bottom: 4px; }
  .stat-label { font-size: 12px; color: var(--text-muted); }
  .controls { position: relative; z-index: 1; padding: 0 40px 32px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .search-box { flex: 1; min-width: 200px; position: relative; }
  .search-box input { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px 12px 40px; color: var(--text); font-family: 'Noto Sans JP', sans-serif; font-size: 14px; outline: none; transition: border-color 0.2s; }
  .search-box input:focus { border-color: var(--accent); }
  .search-box input::placeholder { color: var(--text-muted); }
  .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 16px; }
  .filter-btn { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 10px 18px; color: var(--text-muted); font-family: 'Noto Sans JP', sans-serif; font-size: 13px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 6px; }
  .filter-btn:hover,.filter-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(0,229,255,0.05); }
  .filter-btn.green.active { border-color: var(--green); color: var(--green); background: var(--green-bg); }
  .filter-btn.yellow.active { border-color: var(--yellow); color: var(--yellow); background: var(--yellow-bg); }
  .filter-btn.red.active { border-color: var(--red); color: var(--red); background: var(--red-bg); }
  .section-label { position: relative; z-index: 1; padding: 0 40px 16px; font-size: 12px; font-family: 'Space Mono', monospace; color: var(--text-muted); letter-spacing: 2px; text-transform: uppercase; display: flex; align-items: center; gap: 12px; }
  .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .cards-grid { position: relative; z-index: 1; display: grid; grid-template-columns: repeat(auto-fill,minmax(280px,1fr)); gap: 16px; padding: 0 40px 40px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; transition: transform 0.2s,border-color 0.2s,box-shadow 0.2s; animation: fadeUp 0.4s ease forwards; opacity: 0; }
  .card:hover { transform: translateY(-3px); border-color: rgba(0,229,255,0.2); box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
  @keyframes fadeUp { from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)} }
  .card:nth-child(1){animation-delay:0.05s}.card:nth-child(2){animation-delay:0.10s}.card:nth-child(3){animation-delay:0.15s}.card:nth-child(4){animation-delay:0.20s}.card:nth-child(5){animation-delay:0.25s}.card:nth-child(6){animation-delay:0.30s}
  .card-top { padding: 20px 20px 16px; display: flex; align-items: flex-start; justify-content: space-between; }
  .card-left { display: flex; align-items: center; gap: 12px; }
  .card-icon-wrap { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px; flex-shrink: 0; }
  .card-icon-wrap.green { background: var(--green-bg); }
  .card-icon-wrap.yellow { background: var(--yellow-bg); }
  .card-icon-wrap.red { background: var(--red-bg); }
  .card-name { font-size: 16px; font-weight: 700; margin-bottom: 3px; }
  .card-category { font-size: 12px; color: var(--text-muted); }
  .status-badge { display: flex; flex-direction: column; align-items: center; gap: 2px; padding: 10px 14px; border-radius: 12px; min-width: 72px; }
  .status-badge.green { background: var(--green-bg); border: 1px solid rgba(0,230,118,0.2); }
  .status-badge.yellow { background: var(--yellow-bg); border: 1px solid rgba(255,214,0,0.2); }
  .status-badge.red { background: var(--red-bg); border: 1px solid rgba(255,23,68,0.2); }
  .status-emoji-big { font-size: 22px; line-height: 1; }
  .status-text { font-size: 12px; font-weight: 700; letter-spacing: 0.5px; }
  .status-text.green { color: var(--green); }
  .status-text.yellow { color: var(--yellow); }
  .status-text.red { color: var(--red); }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; margin-top: 1px; }
  .status-dot.green { background: var(--green); animation: blink 1.5s ease-in-out infinite; }
  .status-dot.yellow { background: var(--yellow); }
  .status-dot.red { background: var(--red); animation: blink 0.8s ease-in-out infinite; }
  .card-footer { padding: 12px 20px; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; font-size: 11px; color: var(--text-muted); font-family: 'Space Mono', monospace; }
  .beta-banner { position: relative; z-index: 1; margin: 0 40px 32px; background: rgba(124,58,237,0.08); border: 1px solid rgba(124,58,237,0.25); border-radius: 12px; padding: 16px 20px; display: flex; align-items: center; gap: 14px; font-size: 14px; color: #c4b5fd; }
  .loading { text-align: center; padding: 60px; color: var(--text-muted); font-family: 'Space Mono', monospace; }
  footer { position: relative; z-index: 1; border-top: 1px solid var(--border); padding: 32px 40px; display: flex; align-items: center; justify-content: space-between; color: var(--text-muted); font-size: 12px; }
  @media(max-width:768px){ header{padding:16px 20px} .hero{padding:48px 20px 40px} .stats-bar{margin:0 20px 32px} .controls{padding:0 20px 24px} .cards-grid{padding:0 20px 32px;grid-template-columns:1fr} .section-label{padding:0 20px 12px} .beta-banner{margin:0 20px 24px} footer{padding:24px 20px;flex-direction:column;gap:8px;text-align:center} }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">📍</div>
    <div>
      <div class="logo-text">リアル混雑ナビ</div>
      <div class="logo-sub">REAL-TIME CROWD NAVI</div>
    </div>
  </div>
  <div class="header-right">
    <div class="live-indicator"><span class="live-dot"></span>LIVE</div>
    <div class="beta-badge">β BETA</div>
  </div>
</header>

<section class="hero">
  <div class="hero-glow"></div>
  <div class="hero-tag"><span class="live-dot"></span>宮崎エリア リアルタイム配信中</div>
  <h1>今行くべきか、<br>1秒でわかる。</h1>
  <p>宮崎の飲食店の混雑状況をリアルタイムで確認。行く前に「空いているか」を瞬時に判断できます。</p>
</section>

<div class="stats-bar">
  <div class="stat-item"><div class="stat-num" id="stat-shops">-</div><div class="stat-label">提携店舗数</div></div>
  <div class="stat-item"><div class="stat-num" id="stat-open" style="color:var(--green)">-</div><div class="stat-label">🟢 空いてる</div></div>
  <div class="stat-item"><div class="stat-num" id="stat-normal" style="color:var(--yellow)">-</div><div class="stat-label">🟡 普通</div></div>
  <div class="stat-item"><div class="stat-num" id="stat-busy" style="color:var(--red)">-</div><div class="stat-label">🔴 混雑</div></div>
</div>

<div class="beta-banner">
  <span>🚧</span>
  <span>現在 <strong>β版</strong> として一部機能を公開しています。掲載希望の店舗様はお問い合わせください。</span>
</div>

<div class="controls">
  <div class="search-box">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="店舗名で検索..." oninput="renderCards()">
  </div>
  <button class="filter-btn active" onclick="setFilter('all')" id="btn-all">すべて</button>
  <button class="filter-btn green" onclick="setFilter('green')" id="btn-green">🟢 空いてる</button>
  <button class="filter-btn yellow" onclick="setFilter('yellow')" id="btn-yellow">🟡 普通</button>
  <button class="filter-btn red" onclick="setFilter('red')" id="btn-red">🔴 混雑</button>
</div>

<div class="section-label">提携店舗一覧</div>
<div class="cards-grid" id="cardsGrid"><div class="loading">読み込み中...</div></div>

<footer>
  <div>© 2025 リアル混雑ナビ — Miyazaki, Japan</div>
  <div id="footerTime"></div>
</footer>

<script>
  const SUPABASE_URL = 'https://woysaqfpirvkogofvyou.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_pdoWnX8hMa3qkDqH41yDEw_zw-l1t0k';

  const statusConfig = {
    green: { emoji: '🟢', text: '空いてる', color: 'green', icon: '🍽️' },
    yellow: { emoji: '🟡', text: '普通', color: 'yellow', icon: '🍽️' },
    red: { emoji: '🔴', text: '混雑', color: 'red', icon: '🍽️' },
  };

  let shops = [];
  let currentFilter = 'all';

  async function fetchShops() {
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/shops?select=*&order=name`, {
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`,
        }
      });
      shops = await res.json();
      renderCards();
      updateStats();
    } catch(e) {
      document.getElementById('cardsGrid').innerHTML = '<div class="loading">データの読み込みに失敗しました</div>';
    }
  }

  function setFilter(f) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('btn-' + f).classList.add('active');
    renderCards();
  }

  function updateStats() {
    document.getElementById('stat-shops').textContent = shops.length;
    document.getElementById('stat-open').textContent = shops.filter(s => s.status === 'green').length;
    document.getElementById('stat-normal').textContent = shops.filter(s => s.status === 'yellow').length;
    document.getElementById('stat-busy').textContent = shops.filter(s => s.status === 'red').length;
  }

  function timeAgo(dateStr) {
    if (!dateStr) return '未更新';
    const diff = Math.floor((Date.now() - new Date(dateStr)) / 60000);
    if (diff < 1) return 'たった今';
    if (diff < 60) return `${diff}分前`;
    return `${Math.floor(diff/60)}時間前`;
  }

  function renderCards() {
    const search = document.getElementById('searchInput').value.toLowerCase();
    const grid = document.getElementById('cardsGrid');
    const now = new Date();
    document.getElementById('footerTime').textContent =
      `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')} 更新`;

    const filtered = shops.filter(s => {
      const matchFilter = currentFilter === 'all' || s.status === currentFilter;
      const matchSearch = s.name.toLowerCase().includes(search);
      return matchFilter && matchSearch;
    });

    if (filtered.length === 0) {
      grid.innerHTML = '<div class="loading">該当する店舗がありません</div>';
      return;
    }

    grid.innerHTML = '';
    filtered.forEach(shop => {
      const sc = statusConfig[shop.status] || statusConfig.green;
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div class="card-top">
          <div class="card-left">
            <div class="card-icon-wrap ${sc.color}">${sc.icon}</div>
            <div>
              <div class="card-name">${shop.name}</div>
              <div class="card-category">飲食店</div>
            </div>
          </div>
          <div class="status-badge ${sc.color}">
            <div class="status-emoji-big">${sc.emoji}</div>
            <div class="status-text ${sc.color}">${sc.text}</div>
            <div class="status-dot ${sc.color}"></div>
          </div>
        </div>
        <div class="card-footer">
          <div>🕐 ${timeAgo(shop.updated_at)}</div>
        </div>
      `;
      grid.appendChild(card);
    });

    updateStats();
  }

  fetchShops();
  setInterval(fetchShops, 30000);
</script>
</body>
</html>

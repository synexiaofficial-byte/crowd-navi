<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>宮崎混雑ナビ</title>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#f4f7f4; font-family:'M PLUS Rounded 1c',sans-serif; min-height:100vh; }

header {
  background:white;
  padding:16px 20px;
  display:flex; align-items:center; justify-content:space-between;
  border-bottom:2px solid #e8f0e8;
  position:sticky; top:0; z-index:10;
}
.logo { display:flex; align-items:center; gap:10px; }
.logo-circle {
  width:38px; height:38px;
  background:linear-gradient(135deg,#3d9e5f,#56c47a);
  border-radius:12px;
  display:flex; align-items:center; justify-content:center;
  font-size:20px;
  box-shadow:0 3px 8px rgba(61,158,95,0.3);
}
.logo-name { font-size:17px; font-weight:800; color:#1a3a1a; }
.logo-tag { font-size:10px; color:#7ab87a; }
.live-badge {
  background:#e8f7ed;
  color:#3d9e5f;
  font-size:11px; font-weight:700;
  padding:5px 12px;
  border-radius:100px;
  border:1.5px solid #b8e0c4;
  display:flex; align-items:center; gap:5px;
}
.dot { width:7px; height:7px; background:#3d9e5f; border-radius:50%; animation:blink 1s infinite; }
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}

.hero {
  background:linear-gradient(135deg,#3d9e5f 0%,#56c47a 100%);
  padding:28px 20px 80px;
  position:relative;
  overflow:hidden;
}
.hero::after {
  content:'';
  position:absolute;
  bottom:-40px; left:0; right:0;
  height:80px;
  background:#f4f7f4;
  border-radius:50% 50% 0 0 / 100% 100% 0 0;
}
.hero-inner { position:relative; z-index:1; }
.hero-eyebrow { font-size:12px; color:rgba(255,255,255,0.8); margin-bottom:8px; }
.hero h1 { font-size:26px; font-weight:800; color:white; line-height:1.4; margin-bottom:6px; }
.hero-sub { font-size:13px; color:rgba(255,255,255,0.8); line-height:1.6; }

.stats-row {
  position:relative; z-index:1;
  margin: -30px 16px 20px;
  display:grid; grid-template-columns:repeat(4,1fr); gap:8px;
}
.stat-box {
  background:white;
  border-radius:12px;
  padding:12px 8px;
  text-align:center;
  box-shadow:0 3px 12px rgba(0,0,0,0.07);
}
.stat-box .n { font-size:22px; font-weight:800; line-height:1; }
.stat-box .n.t { color:#3d9e5f; }
.stat-box .n.g { color:#2d8a4e; }
.stat-box .n.y { color:#c47a00; }
.stat-box .n.r { color:#b03030; }
.stat-box .l { font-size:9px; color:#aaa; margin-top:3px; }

.search-wrap { padding:0 16px 12px; }
.search-input {
  width:100%;
  background:white;
  border:1.5px solid #d8e8d8;
  border-radius:100px;
  padding:11px 18px 11px 40px;
  font-family:'M PLUS Rounded 1c',sans-serif;
  font-size:14px; color:#333;
  outline:none;
}
.search-wrap { position:relative; padding:0 16px 12px; }
.search-icon { position:absolute; left:28px; top:50%; transform:translateY(-60%); font-size:16px; }

.tabs {
  display:flex; gap:8px;
  padding:0 16px 16px;
  overflow-x:auto;
}
.tab {
  padding:7px 16px;
  border-radius:100px;
  border:1.5px solid #d0e4d0;
  background:white;
  font-size:13px; font-weight:700;
  cursor:pointer; white-space:nowrap;
  transition:all 0.2s;
  color:#666;
}
.tab.active { background:#3d9e5f; border-color:#3d9e5f; color:white; }

.section-head {
  padding:0 16px 10px;
  font-size:12px; font-weight:700; color:#aaa;
  letter-spacing:1px;
  display:flex; align-items:center; gap:8px;
}
.section-head::after { content:''; flex:1; height:1px; background:#dce8dc; }

.cards { padding:0 16px 32px; display:flex; flex-direction:column; gap:10px; }

.card {
  background:white;
  border-radius:16px;
  padding:16px;
  display:flex; align-items:center; gap:14px;
  box-shadow:0 2px 8px rgba(0,0,0,0.06);
  transition:transform 0.15s;
}
.card:active { transform:scale(0.98); }

.card-icon {
  width:48px; height:48px;
  border-radius:14px;
  display:flex; align-items:center; justify-content:center;
  font-size:22px; flex-shrink:0;
}
.card-icon.green { background:#e8f7ed; }
.card-icon.yellow { background:#fff8e0; }
.card-icon.red { background:#fdeaea; }

.card-info { flex:1; }
.card-name { font-size:15px; font-weight:700; color:#1a2e1a; margin-bottom:2px; }
.card-meta { font-size:11px; color:#aaa; }

.status-pill {
  padding:6px 12px;
  border-radius:100px;
  font-size:12px; font-weight:700;
  white-space:nowrap;
}
.status-pill.green { background:#e8f7ed; color:#2d8a4e; }
.status-pill.yellow { background:#fff8e0; color:#b87a00; }
.status-pill.red { background:#fdeaea; color:#b03030; }

footer { text-align:center; padding:24px; font-size:11px; color:#bbb; border-top:1px solid #dce8dc; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-circle">🍴</div>
    <div>
      <div class="logo-name">混雑ナビ</div>
      <div class="logo-tag">宮崎の飲食店リアルタイム情報</div>
    </div>
  </div>
  <div class="live-badge"><span class="dot"></span>LIVE</div>
</header>

<div class="hero">
  <div class="hero-inner">
    <div class="hero-eyebrow">📍 宮崎市エリア配信中</div>
    <h1>今すぐ行ける<br>お店がわかる</h1>
    <p class="hero-sub">混雑状況をリアルタイムでお届け</p>
  </div>
</div>

<div class="stats-row">
  <div class="stat-box"><div class="n t" id="s-all">-</div><div class="l">全店舗</div></div>
  <div class="stat-box"><div class="n g" id="s-g">-</div><div class="l">空いてる</div></div>
  <div class="stat-box"><div class="n y" id="s-y">-</div><div class="l">普通</div></div>
  <div class="stat-box"><div class="n r" id="s-r">-</div><div class="l">混雑</div></div>
</div>

<div class="search-wrap">
  <span class="search-icon">🔍</span>
  <input class="search-input" type="text" placeholder="店舗名で検索..." oninput="render()">
</div>

<div class="tabs">
  <button class="tab active" onclick="setFilter('all',this)">すべて</button>
  <button class="tab" onclick="setFilter('green',this)">🟢 空いてる</button>
  <button class="tab" onclick="setFilter('yellow',this)">🟡 普通</button>
  <button class="tab" onclick="setFilter('red',this)">🔴 混雑</button>
</div>

<div class="section-head">提携店舗</div>
<div class="cards" id="cards"><div style="text-align:center;padding:40px;color:#bbb">読み込み中...</div></div>

<footer>© 2025 宮崎混雑ナビ β版</footer>

<script>
const SUPABASE_URL='https://woysaqfpirvkogofvyou.supabase.co';
const SUPABASE_KEY='sb_publishable_pdoWnX8hMa3qkDqH41yDEw_zw-l1t0k';
const cfg={green:{label:'空いてる',icon:'🍽️',cls:'green'},yellow:{label:'普通',icon:'🍽️',cls:'yellow'},red:{label:'混雑',icon:'🍽️',cls:'red'}};
let shops=[],filter='all';

async function load(){
  const r=await fetch(`${SUPABASE_URL}/rest/v1/shops?select=*&order=name`,{headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}});
  shops=await r.json(); render();
}

function timeAgo(d){
  if(!d)return '未更新';
  const m=Math.floor((Date.now()-new Date(d))/60000);
  if(m<1)return 'たった今'; if(m<60)return m+'分前'; return Math.floor(m/60)+'時間前';
}

function render(){
  const q=document.querySelector('.search-input')?.value.toLowerCase()||'';
  const list=shops.filter(s=>(filter==='all'||s.status===filter)&&s.name.toLowerCase().includes(q));
  document.getElementById('s-all').textContent=shops.length;
  document.getElementById('s-g').textContent=shops.filter(s=>s.status==='green').length;
  document.getElementById('s-y').textContent=shops.filter(s=>s.status==='yellow').length;
  document.getElementById('s-r').textContent=shops.filter(s=>s.status==='red').length;
  const el=document.getElementById('cards');
  if(!list.length){el.innerHTML='<div style="text-align:center;padding:40px;color:#bbb">該当する店舗がありません</div>';return;}
  el.innerHTML=list.map(s=>{
    const c=cfg[s.status]||cfg.green;
    return `<div class="card">
      <div class="card-icon ${c.cls}">${c.icon}</div>
      <div class="card-info">
        <div class="card-name">${s.name}</div>
        <div class="card-meta">🕐 ${timeAgo(s.updated_at)}</div>
      </div>
      <div class="status-pill ${c.cls}">${c.label}</div>
    </div>`;
  }).join('');
}

function setFilter(f,btn){
  filter=f;
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active'); render();
}

load(); setInterval(load,30000);
</script>
</body>
</html>
